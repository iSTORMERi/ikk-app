<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Имперский Кадетский Корпус</title>
    
    <link rel="apple-touch-icon" href="./logo.png">
    <link rel="icon" type="image/png" href="./logo.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020611;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
        }

        /* Главный контейнер */
        .app-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #061938 0%, #01050f 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        /* КОМПАКТНЫЙ БЛОК ВЕРХНЕЙ ПАНЕЛИ */
        .top-panel-wrapper {
            position: relative;
            width: 100%;
            z-index: 10;
        }

        /* ВЕРХНЕЕ ПЛАТО СТАТУСА */
        .top-plate {
            background: rgba(8, 20, 38, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-bottom: 3px solid #00d4ff;
            padding: 12px 15px;
            border-radius: 4px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 25px rgba(0, 212, 255, 0.15);
        }

        .status-info {
            flex: 1;
        }

        .cadet-id {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d4ff;
            font-weight: bold;
        }

        .cadet-rank {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            margin-top: 2px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .rank-tag {
            font-size: 12px;
            color: rgba(0, 212, 255, 0.7);
            font-weight: normal;
        }

        .xp-container { width: 100%; }
        .xp-text { font-size: 10px; color: #88a0c0; display: flex; justify-content: space-between; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
        .xp-bar-bg { width: 150px; height: 5px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 212, 255, 0.2); overflow: hidden; }
        .xp-bar-fill { width: 0%; height: 100%; background: #00d4ff; }

        /* ЗАГРУЖЕННЫЙ ГЕРБ ИМПЕРИИ ТЕПЕРЬ КАРТИНКА */
        .imperial-emblem-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            /* Эффект неонового синего свечения для картинки */
            filter: drop-shadow(0 0 5px #00d4ff) brightness(1.2);
            opacity: 0.9;
        }

        /* СТИЛЬНЫЙ ПРИСТЫКОВАННЫЙ ТЕРМИНАЛ СВЯЗИ */
        .hq-btn {
            position: absolute;
            right: 15px;
            top: 100%; /* Растет строго от нижней границы верхнего плато */
            width: 100px;
            background: linear-gradient(180deg, rgba(8, 20, 38, 0.95) 0%, rgba(0, 212, 255, 0.08) 100%);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-top: none; /* Убираем верхнюю рамку, чтобы «слить» с верхним плато */
            border-bottom: 2px solid #00d4ff;
            color: #00d4ff;
            border-radius: 0 0 4px 4px;
            padding: 8px 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.1), inset 0 0 10px rgba(0, 212, 255, 0.1);
            text-shadow: 0 0 4px rgba(0, 212, 255, 0.5);
            overflow: hidden;
        }

        /* ЭФФЕКТ ГОЛОГРАФИЧЕСКИХ ПОЛОС ИЗ ЗВЕЗДНЫХ ВОЙН */
        .hq-btn::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 212, 255, 0.2) 50%);
            z-index: 2;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.5;
        }

        .hq-title {
            font-size: 9px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.2;
            z-index: 3;
        }

        /* НИЖНЕЕ НАВИГАЦИОННОЕ ПЛАТО */
        .bottom-plate {
            z-index: 10;
            background: rgba(8, 20, 38, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-top: 3px solid #00d4ff;
            padding: 15px 12px;
            border-radius: 4px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 -4px 25px rgba(0, 212, 255, 0.15);
            padding-bottom: 25px;
        }

        /* ТЕМНО-ЖЕЛТЫЕ КНОПКИ (МЕТАЛЛ) */
        .nav-btn {
            flex: 1;
            background: linear-gradient(180deg, #c49a00 0%, #8a6d00 100%); 
            border: 1px solid #6e5700;
            border-bottom: 3px solid #4a3a00;
            color: #ffffff;
            padding: 16px 2px;
            border-radius: 0px;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 8px rgba(0,0,0,0.4);
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }

        /* Отклик на нажатия */
        .hq-btn:active { transform: scale(0.97); background: rgba(0, 212, 255, 0.15); }
        .nav-btn:active { transform: scale(0.97); background: #8a6d00; box-shadow: inset 0 2px 4px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <div class="app-container">

        <div class="top-panel-wrapper">
            <div class="top-plate">
                <div class="status-info">
                    <div class="cadet-id">IMP-CD-001</div>
                    <div class="cadet-rank">Звание: Новобранец <span class="rank-tag">// REC</span></div>
                    <div class="xp-container">
                        <div class="xp-text"><span>Опыт (XP)</span><span>0 / 100</span></div>
                        <div class="xp-bar-bg"><div class="xp-bar-fill"></div></div>
                    </div>
                </div>
                
                <img class="imperial-emblem-img" src="./IMG_9973.png" alt="Empire">
            </div>

            <div class="hq-btn">
                <div class="hq-title">Терминал<br>связи</div>
            </div>
        </div>

        <div style="flex: 1;"></div>

        <div class="bottom-plate">
            <div class="nav-btn">Подготовка</div>
            <div class="nav-btn">Карьера</div>
            <div class="nav-btn">Архив</div>
        </div>
        
    </div>

</body>
</html>
