<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Имперский Терминал Аттестации</title>
    <style>
        :root {
            --bg-color: #050b14;
            --panel-bg: rgba(10, 25, 47, 0.7);
            --border-blue: #1e3d59;
            --text-cyan: #00ffff;
            --text-muted: #8892b0;
            --accent-gold: #c5a059;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .terminal-container {
            width: 100%;
            max-width: 430px;
            background: linear-gradient(180deg, rgba(6,18,34,1) 0%, rgba(3,9,19,1) 100%);
            border: 2px solid var(--border-blue);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        /* --- Header --- */
        .header-panel {
            border: 1px solid var(--border-blue);
            background: rgba(10, 25, 47, 0.5);
            padding: 12px;
            border-radius: 6px;
            position: relative;
            margin-bottom: 15px;
        }
        .user-tag { color: #5271ff; font-size: 0.8rem; letter-spacing: 1px; }
        .user-rank { font-size: 1.2rem; font-weight: bold; margin: 4px 0; }
        .xp-bar-container { background: #112240; height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .xp-bar { width: 0%; height: 100%; background: var(--text-cyan); }

        /* --- Купола аттестации (Плиточная сетка) --- */
        .domes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .dome-card {
            background: rgba(16, 36, 64, 0.5);
            border: 1px solid var(--border-blue);
            border-radius: 6px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .dome-card:hover {
            background: rgba(0, 255, 255, 0.08);
            border-color: var(--text-cyan);
        }

        .dome-card .counter {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 3px;
        }

        .dome-icon {
            width: 32px;
            height: 32px;
            margin: 0 auto 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Исправление отрисовки шестерёнки и центрирования */
        .dome-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .dome-title {
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Цветовые акценты для иконок доменов */
        .corp-color { color: #ff9f43; fill: #ff9f43; }
        .med-color { color: #2ed573; fill: #2ed573; }
        .tech-color { color: #54a0ff; fill: #54a0ff; }
        .int-color { color: #a55eea; fill: #a55eea; }
        .psy-color { color: #00d2d3; fill: #00d2d3; }
        .surv-color { color: #1dd1a1; fill: #1dd1a1; }
        .cmd-color { color: #ff6b6b; fill: #ff6b6b; }
        .admin-color { color: #feca57; fill: #feca57; }

        /* --- Окно деталей купола (Модальное/Выезжающее) --- */
        .dome-details-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 11, 20, 0.95);
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        .details-content {
            max-width: 400px;
            margin: 40px auto 0 auto;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .modules-list { margin-top: 25px; }
        .module-item {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(0,255,255,0.1);
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(197, 160, 89, 0.2);
            color: var(--accent-gold);
        }

        /* --- Навигация внизу --- */
        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .nav-btn {
            background: rgba(197, 160, 89, 0.15);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 12px 5px;
            text-align: center;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: var(--accent-gold);
            color: #000;
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="header-panel">
        <div class="user-tag">IMP-CD-001</div>
        <div class="user-rank">Звание: Новобранец <span style="color: var(--text-muted); font-size: 0.85rem;">// REC</span></div>
        <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; display: flex; justify-content: space-between;">
            <span>ОПЫТ (XP)</span>
            <span>0 / 100</span>
        </div>
        <div class="xp-bar-container">
            <div class="xp-bar"></div>
        </div>
    </div>

    <div style="font-size: 0.8rem; color: var(--text-cyan); letter-spacing: 1px; margin: 15px 0 10px 0; text-transform: uppercase;">
        | Купола аттестации: REC &rarr; CR
    </div>

    <div class="domes-grid">
        <div class="dome-card" onclick="openDome('CORP', 'ФИЗИЧЕСКИЙ КУПОЛ', [
            { name: 'CORP 1.1 — ФИЗИЧЕСКАЯ ГОТОВНОСТЬ', status: 'СИСТЕМА + ЭКЗАМЕН' },
            { name: 'CORP 1.2 — СИСТЕМА ПИТАНИЯ', status: 'СИСТЕМА' }
        ])">
            <div class="counter">0 / 2</div>
            <div class="dome-icon corp-color">
                <svg viewBox="0 0 24 24"><path d="M11.5 2L2 13h9l-1 9 9.5-11h-9l1-9z"/></svg>
            </div>
            <div class="dome-title">CORP</div>
        </div>

        <div class="dome-card" onclick="openDome('MED', 'МЕДИЦИНСКИЙ КУПОЛ', [
            { name: 'MED 1.1 — ТАКТИЧЕСКАЯ МЕДИЦИНА: MARCH', status: 'ЭКЗАМЕН' },
            { name: 'MED 1.2 — ГРАЖДАНСКАЯ МЕДИЦИНА', status: 'ЗАЧЁТ' }
        ])">
            <div class="counter">0 / 2</div>
            <div class="dome-icon med-color">
                <svg viewBox="0 0 24 24"><path d="M19 10.5h-5.5V5h-3v5.5H5v3h5.5V19h3v-5.5H19v-3z"/></svg>
            </div>
            <div class="dome-title">MED</div>
        </div>

        <div class="dome-card" onclick="openDome('TECH', 'ТЕХНИЧЕСКИЙ КУПОЛ', [
            { name: 'TECH 1.1 — ИНФОРМАЦИОННАЯ БЕЗОПАСНОСТЬ', status: 'ЭКЗАМЕН' },
            { name: 'TECH 1.2 — ЦИФРОВАЯ ГИГИЕНА И ЧИСТЫЙ СТОЛ', status: 'ЗАЧЁТ' }
        ])">
            <div class="counter">0 / 2</div>
            <div class="dome-icon tech-color">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </div>
            <div class="dome-title">TECH</div>
        </div>

        <div class="dome-card" onclick="openDome('INT', 'РАЗВЕДКА И АНАЛИЗ', [
            { name: 'INT 1.1 — СИТУАЦИОННАЯ ОСОЗНАННОСТЬ', status: 'СИСТЕМА' },
            { name: 'INT 1.2 — БАЗОВАЯ РАЗВЕДКА: OSINT-ГРАФ', status: 'ЭКЗАМЕН' }
        ])">
            <div class="counter">0 / 2</div>
            <div class="dome-icon int-color">
                <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
            <div class="dome-title">INT</div>
        </div>

        <div class="dome-card" onclick="openDome('PSY', 'ПСИХОЛОГИЧЕСКИЙ КУПОЛ', [
            { name: 'PSY 1.1 — ПСИХОЛОГИЧЕСКАЯ УСТОЙЧИВОСТЬ', status: 'ТЕСТ' }
        ])">
            <div class="counter">0 / 1</div>
            <div class="dome-icon psy-color">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 9l10 13 10-13L12 2zm0 3.84L18.44 9 12 17.37 5.56 9 12 5.84z"/></svg>
            </div>
            <div class="dome-title">PSY</div>
        </div>

        <div class="dome-card" onclick="openDome('SURV', 'ВЫЖИВАНИЕ И НАВИГАЦИЯ', [
            { name: 'SURV 1.1 — ТОПОГРАФИЯ И ОРИЕНТИРОВАНИЕ', status: 'ЗАЧЁТ' }
        ])">
            <div class="counter">0 / 1</div>
            <div class="dome-icon surv-color">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 16.51V17h-2v1.51c-3.11-.22-5.63-2.58-6.08-5.63H6.5v-2H4.92c.45-3.05 2.97-5.41 6.08-5.63V5h2v1.51c3.11.22 5.63 2.58 6.08 5.63H17.5v2h1.58c-.45 3.05-2.97 5.41-6.08 5.63z"/></svg>
            </div>
            <div class="dome-title">SURV</div>
        </div>

        <div class="dome-card" onclick="openDome('CMD', 'КОМАНДНЫЙ КУПОЛ', [
            { name: 'CMD 1.1 — ТАКТИКА И УПРАВЛЕНИЕ', status: 'КУРС' },
            { name: 'CMD 1.2 — РАБОТА С ЛИЧНЫМ СОСТАВОМ', status: 'СИСТЕМА' },
            { name: 'CMD 1.3 — РЕГЛАМЕНТ СВЯЗИ', status: 'ЭКЗАМЕН' }
        ])">
            <div class="counter">0 / 3</div>
            <div class="dome-icon cmd-color">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <div class="dome-title">CMD</div>
        </div>

        <div class="dome-card" onclick="openDome('ADMIN', 'АДМИНИСТРАТИВНЫЙ КУПОЛ', [
            { name: 'ADMIN 1.1 — ВНУТРЕННИЙ РЕГЛАМЕНТ ГАРНИЗОНА', status: 'ТЕСТ' }
        ])">
            <div class="counter">0 / 1</div>
            <div class="dome-icon admin-color">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            </div>
            <div class="dome-title">ADMIN</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active">ПОДГОТОВКА</div>
        <div class="nav-btn">КАРЬЕРА</div>
        <div class="nav-btn">АРХИВ</div>
    </div>
</div>

<div id="domeOverlay" class="dome-details-overlay">
    <div class="details-content">
        <button class="close-btn" onclick="closeDome()">&laquo; Закрыть купол</button>
        <h2 id="overlayTitle" style="margin-top: 30px; letter-spacing: 1px;">DOMEN</h2>
        <p id="overlaySubtitle" style="color: var(--text-muted); font-size: 0.9rem; margin-top: -5px; text-transform: uppercase;"></p>
        
        <div class="modules-list" id="modulesContainer">
            </div>
    </div>
</div>

<script>
    // Универсальная функция для открытия абсолютно любого купола
    function openDome(code, fullName, modules) {
        document.getElementById('overlayTitle').innerText = code;
        document.getElementById('overlaySubtitle').innerText = fullName;
        
        const container = document.getElementById('modulesContainer');
        container.innerHTML = ''; // Очистка старых модулей
        
        modules.forEach(mod => {
            const item = document.createElement('div');
            item.className = 'module-item';
            item.innerHTML = `
                <div style="font-size: 0.85rem; padding-right: 10px; font-weight: 500;">${mod.name}</div>
                <div class="status-badge">${mod.status}</div>
            `;
            container.appendChild(item);
        });
        
        document.getElementById('domeOverlay').style.display = 'block';
    }

    function closeDome() {
        document.getElementById('domeOverlay').style.display = 'none';
    }
</script>

</body>
</html>
