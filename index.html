<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Имперский Кадетский Корпус</title>
    
    <link rel="apple-touch-icon" href="./logo.png">
    <link rel="icon" type="image/png" href="./logo.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030813; /* Глубокий темно-синий космический фон */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
        }

        /* Главный контейнер */
        .app-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #071630 0%, #020712 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        /* ТАКТИЧЕСКИЕ ПЛАТО (Выделенные панели) */
        
        /* Верхнее плато статуса */
        .top-plate {
            z-index: 10;
            background: rgba(10, 25, 47, 0.85); /* Плотная синяя подложка */
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-left: 4px solid #00d4ff; /* Неоново-голубой акцент */
            padding: 12px 15px;
            border-radius: 4px;
            max-width: 85%;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
        }

        /* Нижнее плато навигации */
        .bottom-plate {
            z-index: 10;
            background: rgba(10, 25, 47, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-bottom: 4px solid #00d4ff;
            padding: 12px 10px;
            border-radius: 4px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 -4px 20px rgba(0, 212, 255, 0.1);
            margin-bottom: 5px; /* Зазор под рамку iPhone */
        }

        /* СТИЛЬ СТАТУСА КАДЕТА */
        .cadet-id {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d4ff; /* Яркий тактический неон */
            font-weight: bold;
        }

        .cadet-rank {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-top: 2px;
            margin-bottom: 6px;
        }

        .xp-container { width: 100%; }
        .xp-text { font-size: 11px; color: #88a0c0; display: flex; justify-content: space-between; margin-bottom: 3px; }
        .xp-bar-bg { width: 150px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 0px; border: 1px solid rgba(0, 212, 255, 0.2); overflow: hidden; }
        .xp-bar-fill { width: 0%; height: 100%; background: #00d4ff; } /* Опыт на 0% */

        /* ГОЛОГРАФИЧЕСКАЯ КНОПКА ШТАБ */
        .right-menu {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .hq-btn {
            background: rgba(0, 212, 255, 0.05);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 18px 10px;
            border-radius: 4px;
            width: 110px;
            font-size: 13px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            /* Эффект мерцания и свечения голограммы */
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4), inset 0 0 10px rgba(0, 212, 255, 0.2);
            text-shadow: 0 0 5px rgba(0, 212, 255, 0.6);
            animation: holo-glow 3s infinite alternate;
        }

        .hq-subtitle {
            font-size: 8px;
            color: rgba(0, 212, 255, 0.7);
            margin-top: 4px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: normal;
        }

        /* НИЖНИЕ ЖЕЛТЫЕ КНОПКИ */
        .nav-btn {
            flex: 1;
            background: #ffcc00; /* Яркий желтый цвет */
            border: 1px solid #e6b800;
            color: #ffffff; /* Белый текст */
            padding: 14px 5px;
            border-radius: 0px; /* Строгие прямоугольные углы */
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* АНИМАЦИЯ ГОЛОГРАММЫ */
        @keyframes holo-glow {
            0% { opacity: 0.9; box-shadow: 0 0 12px rgba(0, 212, 255, 0.3); }
            50% { opacity: 1; box-shadow: 0 0 18px rgba(0, 212, 255, 0.5); }
            100% { opacity: 0.85; box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        }

        /* Визуальный отклик при нажатии */
        .hq-btn:active { transform: scale(0.96); background: rgba(0, 212, 255, 0.2); }
        .nav-btn:active { transform: scale(0.96); background: #e6b800; }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- ВЕРХНЕЕ ПЛАТО СТАТУСА -->
        <div class="top-plate">
            <div class="cadet-id">IMP-CD-001</div>
            <div class="cadet-rank">Кадет Корпуса</div>
            <div class="xp-container">
                <div class="xp-text"><span>Опыт (XP)</span><span>0 / 100</span></div>
                <div class="xp-bar-bg"><div class="xp-bar-fill"></div></div>
            </div>
        </div>

        <!-- ЦЕНТРАЛЬНОЕ ПОЛЕ (Пока пустое плато контента) -->
        <div style="flex: 1;"></div>

        <!-- ЦЕНТРАЛЬНО-ПРАВАЯ ГОЛОГРАММА -->
        <div class="right-menu">
            <div class="hq-btn">
                ШТАБ
                <span class="hq-subtitle">Связь</span>
            </div>
        </div>

        <!-- НИЖНЕЕ НАВИГАЦИОННОЕ ПЛАТО -->
        <div class="bottom-plate">
            <div class="nav-btn">Подготовка</div>
            <div class="nav-btn">Карьера</div>
            <div class="nav-btn">Архив</div>
        </div>
        
    </div>

</body>
</html>
